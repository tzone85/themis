# GoReleaser config — Themis v0.1.x.
# See https://goreleaser.com/customization/ for the schema.
#
# Tag → build matrix (linux/darwin/windows × amd64/arm64) → archives →
# checksums → SBOMs (per archive + per image) → container image
# (linux/amd64 + linux/arm64) → cosign keyless signatures on all of the
# above → GitHub Release with the v0.1.x section of CHANGELOG.md as the
# notes.

version: 2

project_name: themis

before:
  hooks:
    - go mod tidy

builds:
  - id: themis
    main: ./cmd/themis
    binary: themis
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/tzone85/themis/internal/cli.Version={{.Version}}
      - -X github.com/tzone85/themis/internal/cli.Commit={{.ShortCommit}}
      - -X github.com/tzone85/themis/internal/cli.Date={{.Date}}

archives:
  - id: default
    ids: [themis]
    name_template: >-
      themis_{{ .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - SECURITY.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{.ShortCommit}}"

# SPDX SBOMs per archive, attached as release assets. Image SBOMs are
# generated under `dockers` below.
sboms:
  - id: archive
    artifacts: archive
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document"]

# GHCR images for linux/amd64 + linux/arm64. goreleaser builds these as
# separate single-arch images; the `docker_manifests` block fuses them
# into a multi-arch manifest under :v0.1.0 + :latest.
dockers:
  - id: themis-amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    image_templates:
      - "ghcr.io/tzone85/themis:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=VERSION={{.Version}}"
      - "--build-arg=COMMIT={{.ShortCommit}}"
      - "--build-arg=DATE={{.Date}}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
    use: buildx

  - id: themis-arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    image_templates:
      - "ghcr.io/tzone85/themis:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--build-arg=VERSION={{.Version}}"
      - "--build-arg=COMMIT={{.ShortCommit}}"
      - "--build-arg=DATE={{.Date}}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
    use: buildx

docker_manifests:
  - name_template: "ghcr.io/tzone85/themis:{{ .Version }}"
    image_templates:
      - "ghcr.io/tzone85/themis:{{ .Version }}-amd64"
      - "ghcr.io/tzone85/themis:{{ .Version }}-arm64"
  - name_template: "ghcr.io/tzone85/themis:latest"
    image_templates:
      - "ghcr.io/tzone85/themis:{{ .Version }}-amd64"
      - "ghcr.io/tzone85/themis:{{ .Version }}-arm64"

# Cosign keyless on the checksums file. Anyone with cosign can verify
# any archive by verifying the checksums signature, then matching the
# archive's sha256 against the line in checksums.txt — same trust
# property as signing each archive individually with less ceremony.
signs:
  - cmd: cosign
    artifacts: checksum
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"

# Cosign keyless on each pushed image (and the multi-arch manifest).
docker_signs:
  - cmd: cosign
    artifacts: all
    args:
      - sign
      - "${artifact}@${digest}"
      - "--yes"

release:
  github:
    owner: tzone85
    name: themis
  prerelease: auto
  draft: false
  # The v0.1.0 section of CHANGELOG.md becomes the GitHub Release body.
  # Falls back to autogenerated notes if extraction fails — better a
  # release with the wrong body than no release at all.
  header: |
    ## Themis {{ .Tag }}
    Built {{ .Date }} from `{{ .ShortCommit }}` on go1.26.x.
    Verify: see [`docs/ops/deployment.md`](https://github.com/tzone85/themis/blob/main/docs/ops/deployment.md#verify-a-release).

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
