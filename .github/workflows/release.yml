name: release

# Fires on signed semver tags (v*.*.*). Builds the matrix in
# .goreleaser.yaml, pushes the multi-arch image to ghcr.io, signs
# everything with cosign keyless via the GitHub Actions OIDC issuer,
# attaches SPDX SBOMs, and creates the GitHub Release.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # GitHub Release creation
  packages: write   # ghcr.io push
  id-token: write   # cosign keyless OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up QEMU (for cross-arch container builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      # Release-gating govulncheck. Distinct from the advisory posture
      # in ci.yml — a release must not ship known-vulnerable code.
      - name: govulncheck (gating)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
