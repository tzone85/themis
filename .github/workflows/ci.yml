name: ci

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege default. The test job upgrades nothing.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          # Pull the toolchain version from go.mod so CI and local stay in lockstep.
          go-version-file: go.mod
          cache: true

      - name: vet
        run: go vet ./...

      - name: lint
        uses: golangci/golangci-lint-action@7119f3d5ddced62a10a044847a6c6bb0f7a5e76a # v7.0.0
        with:
          # v2 binary required: .golangci.yml uses the v2 schema
          # (linters.settings, linters.exclusions, top-level version: "2").
          version: v2.12.2

      - name: test
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: coverage gate
        run: bash scripts/cover_check.sh

      - name: govulncheck
        # Advisory on PR/main — does not fail the build on stdlib-only findings.
        # Mirrors `make vulncheck-advisory`. The release workflow runs the same
        # check *gating* so vulnerable code can't ship.
        #
        # Pin govulncheck to a tagged version so a backdoored @latest can't
        # silently degrade the scan.
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...
