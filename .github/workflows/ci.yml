name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Pull the toolchain version from go.mod so CI and local stay in lockstep.
          go-version-file: go.mod
          cache: true
      - name: vet
        run: go vet ./...
      - name: lint
        uses: golangci/golangci-lint-action@v7
        with:
          # v2 binary required: .golangci.yml uses the v2 schema
          # (linters.settings, linters.exclusions, top-level version: "2").
          version: v2.1.0
      - name: test
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...
      - name: coverage gate
        run: bash scripts/cover_check.sh
      - name: govulncheck
        # Advisory — does not fail the build on stdlib-only findings; mirrors
        # the local `make vulncheck-advisory` posture.
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
