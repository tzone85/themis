# Per-package coverage targets. Global target is the floor (enforced in scripts/cover_check.sh).
# A package may set a higher target; the gate enforces the higher of (global, per-package).
#
# These targets reflect what is achievable without dependency-injected I/O mocks.
# Several wrapped-error branches in store.go / projection.go (bw.Write, Flush, fsync,
# post-marshal ContentHash) are structurally unreachable in production paths and cannot
# be exercised by ordinary tests. Targets are calibrated above current covered ratios
# so that any net loss of coverage fails CI.
global: 90.0
packages:
  github.com/tzone85/themis/internal/ledger: 90.0
  github.com/tzone85/themis/internal/tenant: 95.0
  github.com/tzone85/themis/internal/cli: 90.0
  github.com/tzone85/themis/internal/bom: 85.0      # Canonical/Hash json.Encode error wraps are structurally unreachable.
  github.com/tzone85/themis/internal/sign: 90.0
  github.com/tzone85/themis/internal/scan: 90.0
  github.com/tzone85/themis/internal/policy: 90.0
  github.com/tzone85/themis/internal/aichange: 90.0
  github.com/tzone85/themis/internal/catalogue: 90.0
  github.com/tzone85/themis/internal/classify: 90.0
  github.com/tzone85/themis/cmd/themis: 0.0  # main() trampoline; covered indirectly via integration smoke.
